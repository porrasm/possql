services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pgtest
      POSTGRES_PASSWORD: pgtest
      POSTGRES_DB: postgres
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgtest"]
      interval: 2s
      timeout: 5s
      retries: 15
